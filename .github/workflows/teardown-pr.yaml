name: Teardown PR Environment

on:
  pull_request:
    types: [closed]

# Default token is unused by SSH-only steps; keep scopes minimal for defense in depth.
permissions:
  contents: read

jobs:
  teardown:
    runs-on: ubuntu-latest
    environment:
      name: pr-deploy
    steps:
      - name: Teardown via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/deployments/pr-${{ github.event.number }}
            docker-compose -p pr-${{ github.event.number }} down
            cd ..
            rm -rf pr-${{ github.event.number }}
