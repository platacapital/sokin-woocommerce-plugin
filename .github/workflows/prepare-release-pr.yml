name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      notes:
        description: "Optional release notes (Markdown). Defaults to a generic message."
        type: string
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          check-latest: true

      - name: Determine current version
        id: cur
        shell: bash
        run: |
          set -euo pipefail
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            TAG=$(git describe --tags --abbrev=0)
            CUR=${TAG#v}
          else
            CUR=$(grep -Eo "\*\s*Version:\s*[^\r\n]+" sokin-pay.php | awk '{print $3}')
          fi
          echo "current=$CUR" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        env:
          CUR: ${{ steps.cur.outputs.current }}
          BUMP: ${{ inputs.bump }}
        shell: bash
        run: |
          set -euo pipefail
          IFS='.' read -r MA MI PA <<< "${CUR:-0.0.0}"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0;;
            minor) MI=$((MI+1)); PA=0;;
            patch) PA=$((PA+1));;
            *) echo "Unknown bump: $BUMP" >&2; exit 1;;
          esac
          NEXT="$MA.$MI.$PA"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Run bump script
        env:
          VERSION: ${{ steps.next.outputs.version }}
          NOTES: ${{ inputs.notes }}
        run: |
          B64=$(printf '%s' "${NOTES:-Maintenance updates.}" | base64 | tr -d '\n')
          node scripts/bump-wp-version.mjs "$VERSION" "$B64"

      - name: Commit, push, and open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.next.outputs.version }}
          CURRENT: ${{ steps.cur.outputs.current }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          BRANCH="release/v$VERSION"
          git checkout -b "$BRANCH"

          # Bullet-list of commit subjects since the last tag becomes the
          # commit body. GitHub's squash UI defaults the squash body to the
          # PR's single commit body, so this also seeds a useful squash body.
          COMMITS=""
          if [ -n "${CURRENT:-}" ] && git rev-parse -q --verify "v$CURRENT" >/dev/null; then
            COMMITS="$(git log "v$CURRENT..HEAD" --no-merges --pretty='* %s')"
          fi

          git add sokin-pay.php readme.txt
          if [ -n "$COMMITS" ]; then
            git commit -m "chore(release): v$VERSION" -m "$COMMITS"
          else
            git commit -m "chore(release): v$VERSION"
          fi

          git push --force-with-lease -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: v$VERSION" \
            --label release \
            --body "Prepares the release bump to v$VERSION.

          - Updates \`sokin-pay.php\` and \`readme.txt\`
          - Changelog is kept newest-first

          After merging this PR, the Release workflow will tag and publish."

